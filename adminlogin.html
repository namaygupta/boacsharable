<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Bellbrook Open Arms Clinic</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,400,0,0" rel="stylesheet">
    
    <link rel="stylesheet" href="assets/css/general.css">
    <link rel="stylesheet" href="assets/css/navbar.css">
    <style>
        /* Page Specific Styles */
        body {
            /* Ensures the background fills the screen nicely without the footer */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, var(--bg-color, #f8f9fa), #ffffff);
        }

        main { 
            padding-top: 140px; 
            max-width: 1400px; 
            margin: 0 auto; 
            padding-inline: 2rem; 
            flex-grow: 1; /* Pushes content to center if needed */
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            box-sizing: border-box;
        }

        .login-container {
            background: var(--surface-color, #ffffff);
            padding: 3.5rem;
            border-radius: var(--radius-lg, 24px);
            box-shadow: var(--shadow-soft, 0 10px 30px rgba(0,0,0,0.05));
            width: 100%;
            max-width: 480px;
            border: 1px solid rgba(0,0,0,0.03);
            text-align: center;
            position: relative;
            overflow: hidden;
            margin-bottom: 4rem;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: var(--primary, #0056b3);
        }

        .login-icon {
            font-size: 56px;
            color: var(--primary, #0056b3);
            margin-bottom: 1rem;
            background: var(--primary-light, #e6f0ff);
            width: 90px;
            height: 90px;
            line-height: 90px;
            border-radius: 50%;
            display: inline-block;
        }

        .login-container h1 {
            font-size: 2rem;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            color: var(--text-main, #333);
        }

        .login-container p {
            color: var(--text-muted, #666);
            margin-bottom: 2.5rem;
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-main, #333);
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.875rem 1.25rem;
            border: 1.5px solid rgba(0,0,0,0.1);
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s ease;
            box-sizing: border-box;
            background: var(--bg-color, #fdfdfd);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary, #0056b3);
            box-shadow: 0 0 0 4px rgba(0, 86, 179, 0.1);
            background: #ffffff;
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: var(--primary, #0056b3);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover, 0 8px 20px rgba(0, 86, 179, 0.25));
        }


        /* Animation Classes */
        .fade-in-up {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease-out forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="island-nav">
        <div class="nav-container">
            <a href="index.html" class="logo-icon" aria-label="Bellbrook Open Arms Clinic Home">
                 <img src="assets/images/logo.png" width="250" alt="BOAC Logo">
            </a>
            
            <nav class="desktop-menu" aria-label="Main Navigation">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="volunteer.html">Volunteer</a>
                
                <div class="dropdown">
                    <button class="dropdown-toggle" aria-haspopup="true" aria-expanded="false">
                        Resources <span class="material-symbols-rounded" style="font-size: 1.2rem;">expand_more</span>
                    </button>
                    <div class="dropdown-menu" role="menu">
                        <a href="articles.html" role="menuitem">Articles</a>
                        <a href="podcasts.html" role="menuitem">Podcasts</a>
                    </div>
                </div>

                <a href="calendar.html">Calendar</a>
                <a href="help.html" class="get-help">Get Help</a>
                <a href="donate.html" class="btn-donate">Donate</a>
            </nav>

            <button class="mobile-toggle" aria-label="Toggle navigation menu" aria-expanded="false">
                <span class="material-symbols-rounded icon-menu">menu</span>
                <span class="material-symbols-rounded icon-close">close</span>
            </button>
        </div>
    </header>

    <div class="mobile-overlay" aria-hidden="true">
        <nav class="mobile-menu">
            <a href="index.html" style="transition-delay: 0.1s">Home</a>
            <a href="about.html" style="transition-delay: 0.15s">About</a>
            <a href="volunteer.html" style="transition-delay: 0.2s">Volunteer</a>
            
            <div class="dropdown" style="transition-delay: 0.25s">
                <button class="dropdown-toggle" aria-haspopup="true" aria-expanded="false">
                    Resources <span class="material-symbols-rounded">expand_more</span>
                </button>
                <div class="dropdown-menu">
                    <a href="articles.html">Articles</a>
                    <a href="podcasts.html">Podcasts</a>
                </div>
            </div>

            <a href="calendar.html" style="transition-delay: 0.3s">Calendar</a>
            <a href="donate.html" class="btn-donate" style="transition-delay: 0.35s">Donate</a>
            <a href="help.html" class="get-help" style="transition-delay: 0.4s">Get Help</a>
        </nav>
    </div>

    <main>
        <div class="login-container fade-in-up">
            <span class="material-symbols-rounded login-icon">admin_panel_settings</span>
            <h1>Admin Access</h1>
            <p>Secure portal for staff and administrators. If you forgot something, call the clinic.</p>
            
            <form action="backend/login-process.php" method="POST" id="adminLoginForm">
                <div class="form-group">
                    <label for="admin_username">Username</label>
                    <input type="text" id="admin_username" name="username" required autocomplete="username" placeholder="Enter your username">
                </div>
                
                <div class="form-group">
                    <label for="admin_password">Password</label>
                    <input type="password" id="admin_password" name="password" required autocomplete="current-password" placeholder="Enter your password">
                </div>
                
                <button type="submit" class="btn-submit">
                    Secure Login
                    <span class="material-symbols-rounded">login</span>
                </button>
            </form>
        </div>
    </main>

    <svg style="width: 0; height: 0; position: absolute;" aria-hidden="true" focusable="false">
        <filter id="liquid-glass-refraction" color-interpolation-filters="sRGB">
            <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="1" result="noise" />
            <feGaussianBlur in="noise" stdDeviation="1" result="blurredNoise" />
            <feDisplacementMap in="SourceGraphic" in2="blurredNoise" scale="8" xChannelSelector="R" yChannelSelector="G" result="displacement" />
        </filter>
    </svg>

    <script src="assets/js/navbar.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('adminLoginForm');
            
            loginForm.addEventListener('submit', (e) => {
                // You can add basic frontend validation here if needed.
                // The actual authentication will be handled by the PHP backend via the POST request.
                const btn = loginForm.querySelector('.btn-submit');
                btn.innerHTML = '<span class="material-symbols-rounded" style="animation: spin 1s linear infinite;">autorenew</span> Authenticating...';
                btn.style.opacity = '0.8';
                btn.style.pointerEvents = 'none';
            });
        });
    </script>
    
    <style>
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>
</body>
</html>
